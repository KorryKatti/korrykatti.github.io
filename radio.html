<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>korry // radio</title>
    <meta name="description" content="a personal radio based on last.fm history">

    <link rel="icon" href="assets/img/icon.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <script defer src="/assets/js/umami.js"
        data-host-url="https://cloud.umami.is"
        data-website-id="ed2f6a6a-1a9a-4f71-a203-c633f8833e5c"></script>

    <style>
        :root {
            --bg: #0D0D0D;
            --bg-surface: #161616;
            --bg-elevated: #1E1E1E;
            --bg-hover: #252525;
            --accent: #E1AD01;
            --accent-dim: #A68000;
            --wine: #722F37;
            --wine-dim: #4D1A20;
            --text: #E8E4DD;
            --text-dim: #7A7670;
            --text-muted: #4A4744;
            --border: #2A2A2A;
            --border-accent: #3A3530;
            --serif: 'IM Fell English', Georgia, serif;
            --sans: 'Space Grotesk', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-weight: 500;
        }

        /* ── LAYOUT ── */
        .app {
            display: grid;
            grid-template-columns: 340px 1fr;
            grid-template-rows: 1fr auto;
            height: 100vh;
            gap: 1px;
            background-color: var(--border);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            grid-row: 1 / 2;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 2rem 1.5rem 1.2rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-family: var(--serif);
            font-size: 2.8rem;
            color: var(--accent);
            line-height: 0.9;
            text-transform: lowercase;
            letter-spacing: -1px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-controls {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .sidebar-controls input {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.85rem;
            padding: 0.6rem 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-controls input:focus {
            border-color: var(--accent-dim);
        }

        .sidebar-controls input::placeholder {
            color: var(--text-muted);
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .track-list::-webkit-scrollbar {
            width: 5px;
        }

        .track-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .track-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .track-item {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            gap: 0.8rem;
            align-items: center;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            transition: background-color 0.15s;
            border-bottom: 1px solid var(--border);
        }

        .track-item:hover {
            background-color: var(--bg-hover);
        }

        .track-item.active {
            background-color: var(--bg-elevated);
            border-left: 3px solid var(--accent);
            padding-left: calc(1.5rem - 3px);
        }

        .track-item.active .track-name {
            color: var(--accent);
        }

        .track-art {
            width: 48px;
            height: 48px;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border);
            object-fit: cover;
            display: block;
        }

        .track-art-placeholder {
            width: 48px;
            height: 48px;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .track-info {
            overflow: hidden;
        }

        .track-name {
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .track-artist {
            font-size: 0.78rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.15rem;
        }

        .track-duration {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .track-list-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .track-list-empty h3 {
            font-family: var(--serif);
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .track-list-empty p {
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* ── MAIN AREA ── */
        .main {
            grid-row: 1 / 2;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .now-playing {
            text-align: center;
            z-index: 2;
            padding: 2rem;
            max-width: 500px;
        }

        .now-playing-art {
            width: 220px;
            height: 220px;
            margin: 0 auto 2rem;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .now-playing-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .now-playing-art .art-placeholder {
            font-family: var(--serif);
            font-size: 4rem;
            color: var(--text-muted);
        }

        .now-playing-art::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--border-accent);
            pointer-events: none;
        }

        .now-playing-title {
            font-family: var(--serif);
            font-size: 2rem;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.5rem;
            text-transform: lowercase;
        }

        .now-playing-artist {
            font-size: 1rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .now-playing-album {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
            font-style: italic;
        }

        .idle-message {
            text-align: center;
            z-index: 2;
        }

        .idle-message h2 {
            font-family: var(--serif);
            font-size: 3rem;
            color: var(--text-muted);
            text-transform: lowercase;
            line-height: 0.9;
        }

        .idle-message p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── VISUALIZER CANVAS ── */
        #visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 1;
            opacity: 0.6;
        }

        /* ── PLAYER BAR ── */
        .player-bar {
            grid-column: 1 / -1;
            grid-row: 2 / 3;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center;
            padding: 0 1.5rem;
            height: 90px;
            gap: 1rem;
        }

        .player-track {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            overflow: hidden;
        }

        .player-art {
            width: 52px;
            height: 52px;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-art .art-placeholder {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .player-track-info {
            overflow: hidden;
        }

        .player-track-name {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-artist {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── PLAYER CONTROLS ── */
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .player-buttons {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .player-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.3rem;
            transition: color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-btn:hover {
            color: var(--text);
        }

        .player-btn:active {
            transform: scale(0.92);
        }

        .player-btn.play-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--text);
            border-radius: 50%;
            color: var(--text);
        }

        .player-btn.play-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .player-btn.active {
            color: var(--accent);
        }

        .player-progress {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            max-width: 500px;
        }

        .player-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            min-width: 32px;
            text-align: center;
        }

        .progress-bar-container {
            flex: 1;
            height: 4px;
            background-color: var(--border);
            cursor: pointer;
            position: relative;
            transition: height 0.1s;
        }

        .progress-bar-container:hover {
            height: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .progress-bar-container:hover .progress-bar-fill::after {
            opacity: 1;
        }

        /* ── PLAYER EXTRA ── */
        .player-extra {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 3px;
            background: var(--border);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.15s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            background: var(--accent);
        }

        .volume-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            background: var(--text-dim);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .back-link {
            position: fixed;
            top: 1.2rem;
            left: 1.5rem;
            z-index: 10;
            font-family: var(--serif);
            font-size: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-bottom: none;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: var(--accent);
            background: none;
        }

        /* ── LOAD MORE ── */
        .load-more-container {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .load-btn {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--serif);
            font-size: 0.95rem;
            padding: 0.6rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .load-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
            border-color: var(--accent-dim);
        }

        .track-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        /* ── SVG ICONS ── */
        .icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .icon-sm {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .icon-lg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }

            .sidebar {
                display: none;
            }

            .player-bar {
                grid-template-columns: 1fr;
                height: auto;
                padding: 0.8rem 1rem;
                gap: 0.5rem;
            }

            .player-track {
                display: none;
            }

            .player-extra {
                display: none;
            }
        }

        /* ── ANIMATIONS ── */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .now-playing-art.playing {
            box-shadow: 0 0 40px rgba(225, 173, 1, 0.1);
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <a href="/" class="back-link">&larr; home</a>

    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>radio.</h1>
                <p>based on last.fm scrobbles</p>
            </div>

            <div class="sidebar-controls">
                <input type="text" id="search-input" placeholder="filter tracks...">
            </div>

            <div class="track-list" id="track-list">
                <div class="track-list-empty" id="empty-state">
                    <h3>no tracks loaded</h3>
                    <p>place a tracks.json file<br>in the site root</p>
                </div>
            </div>

            <div class="track-count" id="track-count"></div>

            <div class="load-more-container" id="load-container" style="display: none;">
                <button class="load-btn" id="load-btn">load tracks.json</button>
            </div>
        </aside>

        <!-- MAIN VISUALIZER AREA -->
        <main class="main" id="main-area">
            <div class="idle-message" id="idle-msg">
                <h2>radio</h2>
                <p>select a track to begin</p>
            </div>

            <div class="now-playing" id="now-playing" style="display: none;">
                <div class="now-playing-art" id="np-art">
                    <span class="art-placeholder" id="np-art-placeholder">&diams;</span>
                    <img id="np-art-img" src="" alt="" style="display: none;">
                </div>
                <div class="now-playing-title" id="np-title"></div>
                <div class="now-playing-artist" id="np-artist"></div>
                <div class="now-playing-album" id="np-album"></div>
            </div>

            <canvas id="visualizer"></canvas>
        </main>

        <!-- PLAYER BAR -->
        <div class="player-bar">
            <div class="player-track" id="player-track">
                <div class="player-art" id="player-art">
                    <span class="art-placeholder" id="player-art-placeholder">&diams;</span>
                    <img id="player-art-img" src="" alt="" style="display: none;">
                </div>
                <div class="player-track-info">
                    <div class="player-track-name" id="player-name">no track selected</div>
                    <div class="player-track-artist" id="player-artist">-</div>
                </div>
            </div>

            <div class="player-controls">
                <div class="player-buttons">
                    <button class="player-btn" id="prev-btn" title="previous">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="player-btn play-btn" id="play-btn" title="play">
                        <svg class="icon-lg" id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="player-btn" id="next-btn" title="next">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
                <div class="player-progress">
                    <span class="player-time" id="time-current">0:00</span>
                    <div class="progress-bar-container" id="progress-bar">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                    <span class="player-time" id="time-total">0:00</span>
                </div>
            </div>

            <div class="player-extra">
                <div class="volume-control">
                    <svg class="icon-sm" viewBox="0 0 24 24" id="volume-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <script src="assets/js/radio.js"></script>
</body>

</html>
