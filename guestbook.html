<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook</title>
    <link rel="stylesheet" href="guestbook.css">
<script defer src="/assets/js/umami.js" data-host-url="https://cloud.umami.is" data-website-id="ed2f6a6a-1a9a-4f71-a203-c633f8833e5c"></script>
</head>

<body>
    <div id="random-image-container"></div>
    <div class="nav">
        <a href="index.html">home</a> :: <a href="blog/index.html">blog</a>
    </div>
    <h1>Guestbook</h1>
    <form id="guestbookForm">
        <input type="text" id="nameInput" placeholder="Your Name" required>
        <input type="url" id="websiteInput" placeholder="Your Website (optional)">
        <textarea id="messageInput" placeholder="Your Message" maxlength="280" required></textarea>
        <div id="charCount">0/280</div>
        <div id="captchaQuestion"></div>
        <input type="text" id="captchaAnswer" placeholder="Your Answer" required>
        <input type="text" id="websiteConfirm" name="website_confirm" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;">
        <button type="submit">Submit</button>
    </form>
    <div id="entryCount"></div>
    <div id="entries"></div>
    <script src="assets/js/prefetch.js"></script>
    <script>
        async function loadEntries() {
            try {
                const response = await fetch('https://korrykatti.pythonanywhere.com/guestbook');
                if (!response.ok) throw new Error('Network response was not ok');
                const entries = await response.json();
                const entriesContainer = document.getElementById('entries');
                const countContainer = document.getElementById('entryCount');

                const escapeHTML = (str) => {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                };

                countContainer.textContent = `${entries.length} signature${entries.length !== 1 ? 's' : ''}`;
                entriesContainer.innerHTML = entries.reverse().map(entry => {
                    const nameDisplay = entry.website
                        ? `<a href="${escapeHTML(entry.website)}" target="_blank" rel="noopener">${escapeHTML(entry.name)}</a>`
                        : escapeHTML(entry.name);
                    return `
                    <div class="entry">
                        <strong>${nameDisplay}</strong>
                        <p>${escapeHTML(entry.message)}</p>
                    </div>
                `}).join('');
            } catch (error) {
                console.error('Error loading entries:', error);
                document.getElementById('entries').innerHTML = 'Error loading entries. Please try again later.';
            }
        }

        function numberToWord(n) {
            const words = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten',
                'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen', 'twenty'];
            return words[n];
        }

        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const question = `What is ${numberToWord(num1)} plus ${numberToWord(num2)}?`;
            document.getElementById('captchaQuestion').textContent = question;
            return { num1, num2, answer: num1 + num2 };
        }

        let captcha = generateCaptcha();

        async function submitMessage(event) {
            event.preventDefault();
            const nameInput = document.getElementById('nameInput');
            const messageInput = document.getElementById('messageInput');
            const websiteInput = document.getElementById('websiteInput');
            const userAnswer = document.getElementById('captchaAnswer').value.trim().toLowerCase();
            const wordAnswer = numberToWord(captcha.answer);

            const lastSubmission = localStorage.getItem('lastSubmission');
            const currentTime = Date.now();
            const twentyDaysInMillis = 20 * 24 * 60 * 60 * 1000;

            if (lastSubmission && (currentTime - lastSubmission < twentyDaysInMillis)) {
                alert('You can only submit once every 20 days. Please wait before trying again.');
                return;
            }

            if (userAnswer !== wordAnswer && userAnswer !== String(captcha.answer)) {
                alert('Incorrect answer to the CAPTCHA. Please try again.');
                captcha = generateCaptcha();
                return;
            }

            try {
                const response = await fetch('https://korrykatti.pythonanywhere.com/submit_message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        name: nameInput.value.trim(),
                        message: messageInput.value.trim(),
                        website: websiteInput.value.trim()
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    localStorage.setItem('lastSubmission', currentTime);
                    nameInput.value = '';
                    messageInput.value = '';
                    websiteInput.value = '';
                    document.getElementById('captchaAnswer').value = '';
                    captcha = generateCaptcha();
                    loadEntries();
                } else {
                    console.error('Error submitting message:', result.message);
                }
            } catch (error) {
                console.error('Error submitting message:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadEntries();
            captcha = generateCaptcha();

            const messageInput = document.getElementById('messageInput');
            const charCount = document.getElementById('charCount');
            messageInput.addEventListener('input', () => {
                charCount.textContent = `${messageInput.value.length}/280`;
            });

            const images = [
                'preview.png',
                'preview(1).png',
                'preview(3).png',
                'preview(4).png',
                'preview(5).png',
                'preview(6).png',
                'preview(7).png'
            ];
            const randomImg = images[Math.floor(Math.random() * images.length)];
            const container = document.getElementById('random-image-container');
            if (container) {
                container.innerHTML = `<img src="assets/img/guestbook/${randomImg}" alt="random guestbook image">`;
            }
        });
        document.getElementById('guestbookForm').addEventListener('submit', submitMessage);
    </script>
</body>

</html>
